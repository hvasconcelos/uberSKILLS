services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - uberskills-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/uberskills.db
    restart: unless-stopped

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  uberskills-data:
